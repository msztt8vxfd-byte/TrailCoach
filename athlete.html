<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080a0d">
<title>TrailCoach — Mon Programme</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,75..125,100..900;1,75..125,100..900&family=Familjen+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0d;--bg1:#0d1017;--surface:#1a2030;--surface2:#202536;
  --border:#252d40;--border2:#2e3850;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,.1);--accent-glow:rgba(232,255,71,.25);
  --orange:#ff6b35;--orange-dim:rgba(255,107,53,.12);
  --blue:#4da6ff;--blue-dim:rgba(77,166,255,.12);
  --green:#2ecc8a;--green-dim:rgba(46,204,138,.12);
  --red:#ff4757;--red-dim:rgba(255,71,87,.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,.12);
  --strava:#fc4c02;--strava-dim:rgba(252,76,2,.12);
  --text:#e8ecf4;--text2:#8892a8;--text3:#4a5470;
  --font-d:'Anybody',sans-serif;--font-b:'Familjen Grotesk',sans-serif;--font-m:'JetBrains Mono',monospace;
  --r:14px;--r-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100%;padding-bottom:64px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:inherit;text-decoration:none}

/* ── HEADER ── */
.header{background:rgba(8,10,13,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--font-d);font-weight:800;font-style:italic;font-size:17px}
.logo em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.ath-badge{font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border2);padding:3px 10px;border-radius:20px;color:var(--text2)}
.btn-sm{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);font-family:var(--font-b);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.btn-strava{background:var(--strava)!important;border-color:var(--strava)!important;color:#fff!important}
.btn-strava:hover{opacity:.88}

/* ── PIN SCREEN ── */
.pin-screen{max-width:360px;margin:80px auto;padding:0 24px;text-align:center}
.pin-logo{font-family:var(--font-d);font-size:28px;font-weight:800;font-style:italic;margin-bottom:8px}
.pin-logo em{color:var(--accent);font-style:normal}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.pin-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px}
.pin-title{font-size:15px;font-weight:700;margin-bottom:6px}
.pin-hint{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.6}
.pin-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-size:26px;font-family:var(--font-m);font-weight:700;color:var(--accent);text-align:center;letter-spacing:.4em;outline:none;transition:border-color .15s}
.pin-input:focus{border-color:var(--accent-glow)}
.pin-input.err{border-color:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-btn{width:100%;margin-top:14px;padding:13px;background:var(--accent);border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:var(--font-b);color:#000;cursor:pointer;transition:opacity .15s}
.pin-btn:hover{opacity:.88}
.pin-btn:disabled{opacity:.4;cursor:not-allowed}
.pin-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* ── LOADING ── */
.loading-screen{text-align:center;padding:80px 20px;color:var(--text3);font-size:13px}
.spin{display:inline-block;animation:rot 1s linear infinite;font-size:22px;margin-bottom:12px}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── PAGE LAYOUT ── */
.page{max-width:680px;margin:0 auto;padding:0 16px 20px}

/* ── ATHLETE HERO ── */
.hero{padding:20px 16px 0;max-width:680px;margin:0 auto}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;gap:16px;align-items:flex-start;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;inset:0;background:var(--hero-tint,transparent);pointer-events:none;border-radius:var(--r)}
.avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:18px;color:#000;flex-shrink:0;position:relative;z-index:1}
.hero-body{flex:1;min-width:0;position:relative;z-index:1}
.hero-name{font-family:var(--font-d);font-size:22px;font-weight:800;font-style:italic;line-height:1.1;margin-bottom:4px}
.hero-sub{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
.hero-kpis{display:flex;gap:18px;flex-wrap:wrap}
.hkpi{min-width:0}
.hkpi-val{font-family:var(--font-m);font-size:18px;font-weight:700;color:var(--accent);line-height:1}
.hkpi-lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.strava-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;background:var(--strava-dim);color:var(--strava);border:1px solid rgba(252,76,2,.3);border-radius:20px;padding:3px 10px;margin-top:10px}
.strava-badge.disconnected{background:var(--surface2);color:var(--text3);border-color:var(--border);cursor:pointer}
.strava-badge.disconnected:hover{border-color:var(--strava);color:var(--strava)}

/* ── WEEK STRIP ── */
.week-strip{max-width:680px;margin:0 auto;padding:14px 16px 0}
.week-strip-inner{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wday{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 4px;text-align:center;cursor:default}
.wday.today{border-color:var(--accent-glow);box-shadow:0 0 12px var(--accent-dim)}
.wday.has-session{border-color:var(--border2)}
.wday-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.wday-num{font-family:var(--font-m);font-size:13px;font-weight:700;color:var(--text2)}
.wday.today .wday-num{color:var(--accent)}
.wday-dots{display:flex;justify-content:center;gap:3px;margin-top:5px;min-height:8px}
.wdot{width:6px;height:6px;border-radius:50%;background:var(--border2)}
.wdot.done{background:var(--green)}
.wdot.planned{background:var(--text3)}
.wdot.today{background:var(--accent)}
.wdot.missed{background:var(--red)}

/* ── WEEK SUMMARY BAR ── */
.week-bar{max-width:680px;margin:0 auto;padding:10px 16px 0}
.week-bar-inner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;display:flex;gap:0;align-items:center}
.wstat{flex:1;text-align:center;border-right:1px solid var(--border)}
.wstat:last-child{border-right:none}
.wstat-val{font-family:var(--font-m);font-size:14px;font-weight:700;color:var(--text)}
.wstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* ── SECTION HEADER ── */
.sect-row{display:flex;align-items:center;justify-content:space-between;padding:20px 0 10px}
.sect-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.sect-action{font-size:11px;color:var(--text3);cursor:pointer}
.sect-action:hover{color:var(--text2)}

/* ── SESSION CARDS ── */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.scard.today{border-color:rgba(232,255,71,.35);box-shadow:0 0 16px var(--accent-dim)}
.scard.done{opacity:.6}
.scard.matched{border-color:rgba(46,204,138,.35)}
.scard-head{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.scard-day{font-weight:700;font-size:12px;flex:1;display:flex;align-items:center;gap:8px}
.today-tag{font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow);border-radius:8px;padding:1px 7px}
.scard-date{font-size:11px;color:var(--text3);font-family:var(--font-m)}
.scard-body{padding:12px 16px}
.scard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.scard-title-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1}
.scard-name{font-size:14px;font-weight:700}
.type-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;font-family:var(--font-m);white-space:nowrap}
.tp-ef{background:var(--green-dim);color:var(--green)}
.tp-frac{background:var(--orange-dim);color:var(--orange)}
.tp-trail{background:var(--blue-dim);color:var(--blue)}
.tp-tempo{background:var(--accent-dim);color:var(--accent)}
.tp-recup{background:var(--surface2);color:var(--text3)}

/* Status pill — tappable */
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:9px;cursor:pointer;transition:opacity .15s,transform .1s;user-select:none;white-space:nowrap}
.status-pill:hover{opacity:.8}
.status-pill:active{transform:scale(.94)}
.status-pill.loading{opacity:.45;cursor:wait;pointer-events:none}
.sp-done{background:var(--green-dim);color:var(--green)}
.sp-plan{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.sp-miss{background:var(--red-dim);color:var(--red)}
.sp-today{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow)}

/* Metrics row */
.scard-metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.metric{font-size:12px;font-family:var(--font-m);color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:6px}
.scard-desc{font-size:12px;color:var(--text3);font-style:italic;line-height:1.7;border-top:1px solid var(--border);padding-top:9px;margin-top:4px}

/* Strava match card */
.match-card{background:var(--strava-dim);border:1px solid rgba(252,76,2,.2);border-radius:var(--r-sm);padding:10px 12px;margin-top:10px;display:flex;align-items:flex-start;gap:10px}
.match-icon{font-size:16px;margin-top:1px}
.match-body{flex:1;min-width:0}
.match-title{font-size:11px;font-weight:700;color:var(--strava);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.match-title a{color:var(--strava);font-size:10px;opacity:.7}
.match-title a:hover{opacity:1}
.match-metrics{display:flex;gap:8px;flex-wrap:wrap}
.match-m{font-size:11px;font-family:var(--font-m);color:var(--text2)}
.match-vs{display:flex;gap:16px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(252,76,2,.15)}
.vs-item{text-align:center}
.vs-val{font-family:var(--font-m);font-size:13px;font-weight:700}
.vs-val.actual{color:var(--strava)}
.vs-val.planned{color:var(--text3)}
.vs-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* ── REST DAY ── */
.rest{background:var(--bg1);border:1px dashed var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rest-day{font-weight:600;font-size:12px;flex:1;display:flex;align-items:center;gap:8px;color:var(--text2)}
.rest-date{font-size:11px;color:var(--text3);font-family:var(--font-m)}
.rest-lbl{font-size:11px;color:var(--text3);font-style:italic}

/* ── STRAVA ACTIVITIES ── */
.act{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
.act:hover{border-color:var(--border2)}
.act-icon{font-size:20px;margin-top:1px;flex-shrink:0}
.act-info{flex:1;min-width:0}
.act-name{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-date{font-size:11px;color:var(--text3);margin-bottom:7px}
.act-metrics{display:flex;gap:6px;flex-wrap:wrap}
.act-m{font-size:11px;font-family:var(--font-m);color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:6px}
.act-link{font-size:10px;color:var(--strava);opacity:.6;flex-shrink:0;margin-top:3px}
.act-link:hover{opacity:1}

/* ── STRAVA CONNECT CARD ── */
.strava-connect-card{background:var(--strava-dim);border:1px solid rgba(252,76,2,.25);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:10px}
.strava-connect-title{font-size:13px;font-weight:700;color:var(--strava);display:flex;align-items:center;gap:7px}
.strava-connect-desc{font-size:12px;color:var(--text2);line-height:1.7}
.strava-connect-btn{align-self:flex-start;background:var(--strava);color:#fff;border:none;border-radius:var(--r-sm);padding:9px 18px;font-size:13px;font-weight:700;font-family:var(--font-b);cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;gap:7px}
.strava-connect-btn:hover{opacity:.88}
.strava-connected-card{background:rgba(46,204,138,.07);border:1px solid rgba(46,204,138,.25);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px}
.strava-connected-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0}
.strava-connected-info{flex:1}
.strava-connected-name{font-size:13px;font-weight:700;color:var(--green)}
.strava-connected-sub{font-size:11px;color:var(--text3);margin-top:2px}
.strava-connected-sync{font-size:11px;color:var(--text2);cursor:pointer;text-decoration:underline}
.strava-connected-sync:hover{color:var(--strava)}

/* ── NEXT WEEK LABEL ── */
.week-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:12px 0 8px;border-top:1px solid var(--border);margin-top:6px}

/* ── UPDATED ── */
.updated-at{font-size:10px;color:var(--text3);text-align:center;padding:6px 0 0}

/* ── FOOTER ── */
.footer{text-align:center;font-size:11px;color:var(--text3);padding:28px 20px 8px;line-height:2}

/* ── ERROR ── */
.err-box{max-width:400px;margin:80px auto;text-align:center;padding:0 24px}
.err-icon{font-size:48px;margin-bottom:16px}
.err-title{font-family:var(--font-d);font-size:22px;font-weight:800;font-style:italic;margin-bottom:10px}
.err-msg{font-size:13px;color:var(--text2);line-height:1.8}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:99;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(46,204,138,.15);border-color:rgba(46,204,138,.3);color:var(--green)}
.toast.err{background:rgba(255,71,87,.15);border-color:rgba(255,71,87,.3);color:var(--red)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Trail<em>.</em>Coach</div>
  <div class="header-right">
    <div class="ath-badge" id="header-name">Programme</div>
    <button class="btn-sm" id="btn-refresh" style="display:none" onclick="refreshData()">↻</button>
  </div>
</div>

<div id="app">
  <div class="loading-screen"><div class="spin">⟳</div><br>Chargement…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const ICONS={EF:'🏃',FRAC:'🔥',TRAIL:'🏔',TEMPO:'⚡',RECUP:'♻'};
const PILLS={EF:'tp-ef',FRAC:'tp-frac',TRAIL:'tp-trail',TEMPO:'tp-tempo',RECUP:'tp-recup'};
const LABELS={EF:'EF',FRAC:'FRAC',TRAIL:'TRAIL',TEMPO:'TEMPO',RECUP:'RÉCUP'};
const DAYS_SHORT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const DAYS_LONG=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MONTHS=['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];

const params=new URLSearchParams(window.location.search);
const ATH_ID=params.get('id');
const PIN_KEY=ATH_ID?`ath_pin_${ATH_ID}`:null;
const STRAVA_CODE=params.get('code');
const STRAVA_STATE=params.get('state');

// ── Helpers ──────────────────────────────────────────────────
function fmtDist(m){return m>=1000?(m/1000).toFixed(1)+' km':m+'m'}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h${String(m).padStart(2,'0')}`:`${m}min`}
function fmtPace(secPerM){if(!secPerM)return null;const mpm=secPerM*1000/60;const m=Math.floor(mpm);const s=Math.round((mpm-m)*60);return`${m}:${String(s).padStart(2,'0')}/km`}
function fmtDate(d){const dt=new Date(d);return`${dt.getDate()} ${MONTHS[dt.getMonth()]}`}
function initials(p,n){return((p||'')[0]||'').toUpperCase()+((n||'')[0]||'').toUpperCase()}
function getMon(offset=0){
  const d=new Date();d.setHours(0,0,0,0);
  const dw=d.getDay();d.setDate(d.getDate()-(dw===0?6:dw-1)+(offset*7));
  return d;
}
function dayIdx(d){return d.getDay()===0?6:d.getDay()-1}

function showToast(msg,type='',dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');
  void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── API ───────────────────────────────────────────────────────
async function fetchData(pin){
  const res=await fetch(`/api/athlete-data?id=${ATH_ID}&pin=${encodeURIComponent(pin)}`);
  if(!res.ok){const e=await res.json();throw new Error(e.error||'Erreur '+res.status);}
  return res.json();
}

// ── PIN SCREEN ────────────────────────────────────────────────
function showPinScreen(errMsg='',hint=''){
  document.getElementById('app').innerHTML=`
    <div class="pin-screen">
      <div class="pin-logo">Trail<em>.</em>Coach</div>
      <div class="pin-sub">${hint||'Entre ton PIN pour accéder à ton programme'}</div>
      <div class="pin-card">
        <div class="pin-title">Code PIN</div>
        <div class="pin-hint">Ton coach t'a communiqué un code à 4 chiffres.</div>
        <input class="pin-input" id="pin-input" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]*" placeholder="• • • •" autocomplete="off">
        <button class="pin-btn" id="pin-btn" onclick="submitPin()">Accéder →</button>
        <div class="pin-err" id="pin-err">${errMsg}</div>
      </div>
    </div>`;
  const inp=document.getElementById('pin-input');
  inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitPin();});
}

async function submitPin(){
  const inp=document.getElementById('pin-input');
  const btn=document.getElementById('pin-btn');
  const errEl=document.getElementById('pin-err');
  const pin=(inp.value||'').trim();
  if(pin.length!==4){errEl.textContent='4 chiffres requis.';inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),500);return;}
  btn.disabled=true;btn.textContent='Vérification…';errEl.textContent='';
  try{
    const data=await fetchData(pin);
    localStorage.setItem(PIN_KEY,pin);
    // Finaliser la connexion Strava si en attente
    const pendingCode=sessionStorage.getItem('pending_strava_code');
    if(pendingCode){
      sessionStorage.removeItem('pending_strava_code');
      renderApp(data);
      await connectStrava(pendingCode,pin,data);
      return;
    }
    renderApp(data);
  }catch(e){
    btn.disabled=false;btn.textContent='Accéder →';
    errEl.textContent=e.message==='PIN incorrect'?'PIN incorrect. Vérifie auprès de ton coach.':'Erreur : '+e.message;
    inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),500);
    inp.value='';inp.focus();
  }
}

// ── REFRESH ───────────────────────────────────────────────────
async function refreshData(){
  const btn=document.getElementById('btn-refresh');
  if(btn)btn.textContent='⟳';
  const pin=localStorage.getItem(PIN_KEY);
  if(!pin){showPinScreen();return;}
  try{
    const data=await fetchData(pin);
    renderApp(data);
  }catch(e){
    if(e.message==='PIN incorrect'){localStorage.removeItem(PIN_KEY);showPinScreen('Session expirée — entre ton PIN.');}
    else if(btn){btn.textContent='↻';}
  }
}

// ── STRAVA CONNECT ────────────────────────────────────────────
function startStravaOAuth(clientId){
  if(!clientId){showToast('Client ID Strava manquant — contacte ton coach','err');return;}
  // Stocker dans sessionStorage avant la redirection
  const pin=localStorage.getItem(PIN_KEY);
  if(pin)sessionStorage.setItem('strava_pre_pin',pin);
  const redirectUri=encodeURIComponent(window.location.origin+'/athlete.html?id='+ATH_ID);
  window.location.href=`https://www.strava.com/oauth/authorize`
    +`?client_id=${clientId}`
    +`&redirect_uri=${redirectUri}`
    +`&response_type=code`
    +`&approval_prompt=auto`
    +`&scope=read,activity:read_all`
    +`&state=${ATH_ID}`;
}

async function connectStrava(code,pin,existingData){
  showToast('Connexion Strava en cours…','',4000);
  try{
    const res=await fetch('/api/strava-token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,grant_type:'authorization_code',athId:ATH_ID,pin}),
    });
    const d=await res.json();
    if(!res.ok)throw new Error(d.error||'Erreur Strava');
    showToast('⚡ Strava connecté !','ok');
    // Clean URL
    window.history.replaceState({},'','/athlete.html?id='+ATH_ID);
    // Reload data with Strava info
    const fresh=await fetchData(pin);
    renderApp(fresh);
  }catch(e){
    showToast('Erreur Strava: '+e.message,'err');
    window.history.replaceState({},'','/athlete.html?id='+ATH_ID);
    if(existingData)renderApp(existingData);
  }
}

// ── SESSION TOGGLE ────────────────────────────────────────────
async function toggleSessionDone(pillEl,sessId,currentDone){
  if(pillEl.classList.contains('loading'))return;
  const pin=localStorage.getItem(PIN_KEY);
  if(!pin){showPinScreen();return;}
  const newDone=!currentDone;
  const oldClass=pillEl.className,oldText=pillEl.textContent;
  const scard=pillEl.closest('.scard');
  pillEl.className='status-pill loading';
  pillEl.textContent=newDone?'✓ Réalisé':'Prévu';
  try{
    const res=await fetch('/api/athlete-data',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:ATH_ID,pin,sessId,done:newDone}),
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error||'Erreur');}
    pillEl.className='status-pill '+(newDone?'sp-done':'sp-plan');
    pillEl.textContent=newDone?'✓ Réalisé':'Prévu';
    pillEl.setAttribute('onclick',`toggleSessionDone(this,${JSON.stringify(sessId)},${newDone})`);
    if(scard){scard.classList.toggle('done',newDone);}
    showToast(newDone?'Séance validée ✓':'Séance non réalisée','ok');
  }catch(e){
    pillEl.className=oldClass;
    pillEl.textContent=oldText;
    showToast('Erreur: '+e.message,'err');
  }
}

// ── RENDER ────────────────────────────────────────────────────
function renderApp(data){
  const {prenom,nom,color,niv,obj,disc,sessions=[],activities=[],updatedAt,strava,stravaClientId}=data;
  document.getElementById('header-name').textContent=`${prenom} ${nom[0]}.`;
  document.getElementById('btn-refresh').style.display='';
  document.title=`TrailCoach — ${prenom} ${nom}`;

  const today=new Date();today.setHours(0,0,0,0);
  const mon=getMon();
  const sun=new Date(mon);sun.setDate(mon.getDate()+7);

  // Semaine courante
  const weekSess=sessions.filter(x=>{const d=new Date(x.d);d.setHours(0,0,0,0);return d>=mon&&d<sun;});
  const done=weekSess.filter(x=>x.ok).length;
  const kmPlanned=weekSess.reduce((acc,x)=>acc+(x.dist||x.km||0),0);
  const minPlanned=weekSess.reduce((acc,x)=>acc+(x.dur||Math.round((x.sec||0)/60)||0),0);
  const dpPlanned=weekSess.reduce((acc,x)=>acc+(x.dp||0),0);

  // Index des activités Strava par sessId
  const actBySession={};
  const actByDate={};
  activities.forEach(a=>{
    if(a.sessId)actBySession[a.sessId]=a;
    const dk=a.d?a.d.slice(0,10):'';
    if(dk&&!actByDate[dk])actByDate[dk]=a;
  });
  // Chercher les matches via stravaId sur les sessions
  sessions.forEach(s=>{
    if(s.stravaId){
      const act=activities.find(a=>String(a.id)===String(s.stravaId));
      if(act)actBySession[s.id]=act;
    }
  });

  // ── HERO ──
  let html=`<div class="hero">
    <div class="hero-card" style="--hero-tint:${color}0d">
      <div class="avatar" style="background:${color}">${initials(prenom,nom)}</div>
      <div class="hero-body">
        <div class="hero-name">${prenom} ${nom}</div>
        <div class="hero-sub">${disc||''} · ${niv||''}<br>${obj||''}</div>
        <div class="hero-kpis">
          <div class="hkpi"><div class="hkpi-val">${kmPlanned>0?(kmPlanned/1000).toFixed(0):weekSess.reduce((a,x)=>a+(x.dist||0),0)+''}km</div><div class="hkpi-lbl">planifiés</div></div>
          <div class="hkpi"><div class="hkpi-val">${done}/${weekSess.length}</div><div class="hkpi-lbl">séances</div></div>
          ${minPlanned?`<div class="hkpi"><div class="hkpi-val">${minPlanned>=60?Math.round(minPlanned/60)+'h':minPlanned+'min'}</div><div class="hkpi-lbl">durée</div></div>`:''}
          ${dpPlanned?`<div class="hkpi"><div class="hkpi-val">${dpPlanned>1000?(dpPlanned/1000).toFixed(1)+'k':dpPlanned}m</div><div class="hkpi-lbl">D+</div></div>`:''}
        </div>
        ${strava?.athleteId
          ?`<div class="strava-badge">⚡ Strava connecté · sync auto</div>`
          :(stravaClientId?`<div class="strava-badge disconnected" onclick="startStravaOAuth('${stravaClientId}')">⚡ Connecter Strava</div>`:'')}
      </div>
    </div>
  </div>`;

  // ── WEEK STRIP ──
  html+=`<div class="week-strip"><div class="week-strip-inner">`;
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);d.setHours(0,0,0,0);
    const isT=d.getTime()===today.getTime();
    const isPast=d<today;
    const daySess=sessions.filter(x=>{const sd=new Date(x.d);sd.setHours(0,0,0,0);return sd.getTime()===d.getTime();});
    const hasSess=daySess.length>0;
    html+=`<div class="wday${isT?' today':''}${hasSess?' has-session':''}">
      <div class="wday-name">${DAYS_SHORT[i]}</div>
      <div class="wday-num">${d.getDate()}</div>
      <div class="wday-dots">${hasSess?daySess.map(s=>{
        const cls=s.ok?'done':isT?'today':isPast?'missed':'planned';
        return`<div class="wdot ${cls}"></div>`;
      }).join(''):'<div class="wdot"></div>'}</div>
    </div>`;
  }
  html+=`</div></div>`;

  // ── WEEK BAR ──
  html+=`<div class="week-bar"><div class="week-bar-inner">
    <div class="wstat"><div class="wstat-val">${done}/${weekSess.length}</div><div class="wstat-lbl">Séances</div></div>
    <div class="wstat"><div class="wstat-val">${done>0&&weekSess.length>0?Math.round(done/weekSess.length*100):0}%</div><div class="wstat-lbl">Complétion</div></div>
    <div class="wstat"><div class="wstat-val">${kmPlanned>0?((kmPlanned/1000).toFixed(0)):weekSess.reduce((a,x)=>a+(x.dist||0),0)} km</div><div class="wstat-lbl">Volume</div></div>
    <div class="wstat"><div class="wstat-val">${dpPlanned?dpPlanned+'m':'—'}</div><div class="wstat-lbl">D+</div></div>
  </div></div>`;

  if(updatedAt){
    const upd=new Date(updatedAt);
    html+=`<div class="page"><div class="updated-at">Mis à jour le ${upd.toLocaleDateString('fr',{day:'numeric',month:'long'})} à ${upd.toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</div>`;
  }else{
    html+=`<div class="page">`;
  }

  // ── PROGRAMME 2 SEMAINES ──
  html+=`<div class="sect-row"><div class="sect-title">Programme — 2 semaines</div></div>`;

  let lastWeekLabel='';
  for(let i=0;i<14;i++){
    const day=new Date(mon);day.setDate(mon.getDate()+i);day.setHours(0,0,0,0);
    const isToday=day.getTime()===today.getTime();
    const isPast=day<today;
    const dname=DAYS_LONG[dayIdx(day)];
    const ddate=`${day.getDate()} ${MONTHS[day.getMonth()]}`;
    const daySess=sessions.filter(x=>{const sd=new Date(x.d);sd.setHours(0,0,0,0);return sd.getTime()===day.getTime();});
    const dk=day.toISOString().slice(0,10);

    if(i===7){html+=`<div class="week-label">Semaine prochaine</div>`;}

    if(daySess.length){
      daySess.forEach(sess=>{
        const sc=sess.ok?'sp-done':isToday?'sp-today':isPast?'sp-miss':'sp-plan';
        const sl=sess.ok?'✓ Réalisé':isToday?'Aujourd\'hui':isPast?'Non réalisé':'Prévu';
        const mets=[
          sess.dur?sess.dur+' min':(sess.sec?fmtDur(sess.sec):null),
          sess.dist?sess.dist+' km':(sess.km?fmtDist(sess.km):null),
          sess.dp?'+'+sess.dp+'m D+':null,
          sess.al?fmtPace(sess.al):null,
        ].filter(Boolean);
        const matchedAct=actBySession[sess.id]||(sess.ok?actByDate[dk]:null);
        html+=`<div class="scard${isToday?' today':''}${sess.ok?' done':''}${matchedAct?' matched':''}">
          <div class="scard-head">
            <span class="scard-day">${dname}${isToday?` <span class="today-tag">Aujourd'hui</span>`:''}</span>
            <span class="scard-date">${ddate}</span>
          </div>
          <div class="scard-body">
            <div class="scard-top">
              <div class="scard-title-row">
                <span class="scard-name">${ICONS[sess.t]||'🏃'} ${sess.ti||sess.n||'Séance'}</span>
                <span class="type-pill ${PILLS[sess.t]||'tp-ef'}">${LABELS[sess.t]||sess.t||'EF'}</span>
              </div>
              <span class="status-pill ${sc}" onclick="toggleSessionDone(this,${JSON.stringify(sess.id)},${sess.ok})">${sl}</span>
            </div>
            ${mets.length?`<div class="scard-metrics">${mets.map(m=>`<span class="metric">${m}</span>`).join('')}</div>`:''}
            ${sess.de?`<div class="scard-desc">${sess.de}</div>`:''}
            ${matchedAct?renderMatchCard(matchedAct,sess):''}
          </div>
        </div>`;
      });
    }else{
      html+=`<div class="rest${isToday?' scard today':''}">
        <span class="rest-day">${dname}${isToday?` <span class="today-tag" style="font-size:10px">Aujourd'hui</span>`:''}</span>
        <span class="rest-date">${ddate}</span>
        <span class="rest-lbl">Repos</span>
      </div>`;
    }
  }

  // ── STRAVA ──
  if(strava?.athleteId){
    html+=`<div class="sect-row"><div class="sect-title">⚡ Mes activités Strava</div><span class="sect-action" onclick="syncStravaActivities()">↻ Sync</span></div>`;
    if(activities.length){
      activities.slice(0,15).forEach(act=>{
        const mets=[
          act.km?fmtDist(act.km):(act.distM?fmtDist(act.distM):null),
          act.sec?fmtDur(act.sec):null,
          act.dp?'+'+act.dp+'m':null,
          act.al?fmtPace(act.al):null,
          act.fc?act.fc+' bpm':null,
        ].filter(Boolean);
        const icon=act.t==='TrailRun'?'🏔':act.t==='Hike'?'🥾':'🏃';
        html+=`<div class="act">
          <div class="act-icon">${icon}</div>
          <div class="act-info">
            <div class="act-name">${act.n||act.nom||'Activité'}</div>
            <div class="act-date">${fmtDate(act.d||act.date)}</div>
            <div class="act-metrics">${mets.map(m=>`<span class="act-m">${m}</span>`).join('')}</div>
          </div>
          ${(act.url||act.stravaUrl)?`<a class="act-link" href="${act.url||act.stravaUrl}" target="_blank">↗</a>`:''}
        </div>`;
      });
    }else{
      html+=`<div style="font-size:12px;color:var(--text3);padding:16px 0">Aucune activité récente — elles apparaîtront après ta prochaine sortie.</div>`;
    }
  }else if(stravaClientId){
    html+=`<div class="sect-row"><div class="sect-title">⚡ Strava</div></div>
    <div class="strava-connect-card">
      <div class="strava-connect-title">⚡ Connecte ton compte Strava</div>
      <div class="strava-connect-desc">Synchronise automatiquement tes activités. Tes séances seront validées dès que tu enregistres une sortie sur Strava, Garmin ou Suunto.</div>
      <button class="strava-connect-btn" onclick="startStravaOAuth('${stravaClientId}')">⚡ Connecter Strava</button>
    </div>`;
  }

  html+=`<div class="footer">Programme établi par ton coach · TrailCoach Pro</div></div>`;
  document.getElementById('app').innerHTML=html;
}

function renderMatchCard(act,sess){
  const actDist=act.km||act.distM||0;
  const planDist=(sess.dist||(sess.km?sess.km/1000:0)||0)*1000;
  const actDur=act.sec||0;
  const planDur=(sess.dur?sess.dur*60:0)||(sess.sec||0);
  const mets=[
    actDist?fmtDist(actDist):null,
    actDur?fmtDur(actDur):null,
    act.dp?'+'+act.dp+'m':null,
    act.al?fmtPace(act.al):null,
    act.fc?act.fc+' bpm':null,
  ].filter(Boolean);
  const showVs=(actDist&&planDist)||(actDur&&planDur);
  return`<div class="match-card">
    <div class="match-icon">⚡</div>
    <div class="match-body">
      <div class="match-title">
        ${act.n||act.nom||'Activité Strava'}
        ${(act.url||act.stravaUrl)?`<a href="${act.url||act.stravaUrl}" target="_blank">↗ Voir</a>`:''}
      </div>
      <div class="match-metrics">${mets.map(m=>`<span class="match-m">${m}</span>`).join(' · ')}</div>
      ${showVs?`<div class="match-vs">
        ${actDist&&planDist?`<div class="vs-item"><div class="vs-val actual">${(actDist/1000).toFixed(1)}km</div><div class="vs-lbl">Réalisé</div></div><div class="vs-item"><div class="vs-val planned">${(planDist/1000).toFixed(1)}km</div><div class="vs-lbl">Planifié</div></div>`:''}
        ${actDur&&planDur?`<div class="vs-item"><div class="vs-val actual">${fmtDur(actDur)}</div><div class="vs-lbl">Durée</div></div><div class="vs-item"><div class="vs-val planned">${fmtDur(planDur)}</div><div class="vs-lbl">Cible</div></div>`:''}
      </div>`:''}
    </div>
  </div>`;
}

async function syncStravaActivities(){
  const pin=localStorage.getItem(PIN_KEY);
  if(!pin)return;
  showToast('Sync Strava…','',3000);
  try{
    const data=await fetchData(pin);
    renderApp(data);
    showToast('Activités mises à jour ✓','ok');
  }catch(e){showToast('Erreur: '+e.message,'err');}
}

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="err-box">
      <div class="err-icon">🏔</div>
      <div class="err-title">Oups</div>
      <div class="err-msg">${msg}</div>
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────
(async function init(){
  if(!ATH_ID){
    showError('Lien invalide — aucun identifiant athlète.<br><br>Demande à ton coach de te renvoyer le lien.');
    return;
  }

  // Retour OAuth Strava : state doit correspondre à l'ATH_ID
  if(STRAVA_CODE && STRAVA_STATE === ATH_ID){
    const pin=localStorage.getItem(PIN_KEY)||sessionStorage.getItem('strava_pre_pin');
    if(pin){
      localStorage.setItem(PIN_KEY,pin);
      sessionStorage.removeItem('strava_pre_pin');
      document.getElementById('app').innerHTML=`<div class="loading-screen"><div class="spin">⟳</div><br>Connexion Strava…</div>`;
      try{
        const data=await fetchData(pin);
        renderApp(data);
        await connectStrava(STRAVA_CODE,pin,data);
      }catch{
        showPinScreen('','Entre ton PIN pour finaliser la connexion Strava.');
        sessionStorage.setItem('pending_strava_code',STRAVA_CODE);
      }
    }else{
      showPinScreen('','Entre ton PIN pour finaliser la connexion Strava.');
      sessionStorage.setItem('pending_strava_code',STRAVA_CODE);
    }
    return;
  }

  const savedPin=localStorage.getItem(PIN_KEY);
  if(savedPin){
    try{
      const data=await fetchData(savedPin);
      renderApp(data);
    }catch(e){
      localStorage.removeItem(PIN_KEY);
      showPinScreen(e.message==='PIN incorrect'?'':'Erreur de connexion. Entre ton PIN.');
    }
  }else{
    showPinScreen();
  }
})();
</script>
