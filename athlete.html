<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080a0d">
<title>TrailCoach — Mon Programme</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,75..125,100..900;1,75..125,100..900&family=Familjen+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/athlete.css">
</head>
<body>

<div class="header">
  <div class="logo">Trail<em>.</em>Coach</div>
  <div class="header-right">
    <div class="ath-badge" id="header-name">Programme</div>
    <button class="btn-sm" id="btn-refresh" style="display:none" onclick="refreshData()">↻</button>
  </div>
</div>

<div id="app">
  <div class="loading-screen"><div class="spin">⟳</div><br>Chargement…</div>
</div>

<nav class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-item active" id="tab-btn-programme" onclick="showTab('programme')">
    <span class="tab-icon">📅</span>
    <span class="tab-label">Programme</span>
  </button>
  <button class="tab-item" id="tab-btn-activites" onclick="showTab('activites')">
    <span class="tab-icon">⚡</span>
    <span class="tab-label">Activités</span>
  </button>
  <button class="tab-item" id="tab-btn-profil" onclick="showTab('profil')">
    <span class="tab-icon">◎</span>
    <span class="tab-label">Profil</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="/js/utils.js"></script>
<script src="/js/athlete.js"></script>
</body>
</html>
