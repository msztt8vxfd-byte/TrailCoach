[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/strava-token"
  to = "/.netlify/functions/strava-token"
  status = 200

[[redirects]]
  from = "/api/strava-activities"
  to = "/.netlify/functions/strava-activities"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
