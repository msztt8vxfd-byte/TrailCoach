[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/athlete-data"
  to = "/.netlify/functions/athlete-data"
  status = 200

[[redirects]]
  from = "/api/strava-webhook"
  to = "/.netlify/functions/strava-webhook"
  status = 200

[[redirects]]
  from = "/api/strava-webhook-setup"
  to = "/.netlify/functions/strava-webhook-setup"
  status = 200

[[redirects]]
  from = "/api/strava-token"
  to = "/.netlify/functions/strava-token"
  status = 200

[[redirects]]
  from = "/api/strava-activities"
  to = "/.netlify/functions/strava-activities"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
